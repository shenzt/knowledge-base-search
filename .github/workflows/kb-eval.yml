name: KB Eval

# Full retrieval eval with RAGAS faithfulness scoring.
# Runs all 35 SO test cases + generates answers via DeepSeek + RAGAS judge.
#
# Triggers:
#   - Manual dispatch (workflow_dispatch)
#   - Auto after KB Update succeeds (workflow_run)

on:
  workflow_dispatch:
    inputs:
      ragas:
        description: "Run RAGAS faithfulness scoring"
        type: boolean
        default: true
      top_k:
        description: "Number of results to retrieve"
        type: number
        default: 5
      hybrid:
        description: "Use hybrid search (dense+sparse+reranker)"
        type: boolean
        default: false
      skill_eval:
        description: "Run E2E /search skill eval (Agent pipeline)"
        type: boolean
        default: false
      skill_concurrency:
        description: "Parallel Agent sessions for skill eval"
        type: number
        default: 2
  workflow_run:
    workflows: ["KB Update"]
    types: [completed]

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports: ["6333:6333"]
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost
          sudo apt-get clean

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: hf-bge-m3-reranker-v1

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Restore Qdrant snapshot
        run: python scripts/index.py --snapshot-import kb/kb-redis-docs/snapshots/knowledge-base.snapshot
        env:
          QDRANT_URL: http://localhost:6333

      - name: Run retrieval eval
        run: |
          ARGS=""
          if [ "${{ inputs.ragas || 'true' }}" = "true" ]; then
            ARGS="--ragas"
          fi
          if [ "${{ inputs.hybrid || 'false' }}" = "true" ]; then
            ARGS="$ARGS --hybrid"
          fi
          python scripts/eval_retrieval.py $ARGS --top-k ${{ inputs.top_k || '5' }}
        env:
          QDRANT_URL: http://localhost:6333
          EMBEDDING_PROVIDER: openai
          EMBEDDING_BASE_URL: https://openrouter.ai/api/v1
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_MODEL: baai/bge-m3
          EMBEDDING_DIM: "1024"
          JUDGE_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          JUDGE_MODEL: deepseek-chat
          JUDGE_BASE_URL: https://api.deepseek.com

      # ── Skill eval: DeepSeek v3 via claude-code-router ──
      - name: Install Claude Code
        if: inputs.skill_eval == true
        run: npm install -g @anthropic-ai/claude-code@latest
        continue-on-error: true

      - name: Install claude-code-router
        if: inputs.skill_eval == true
        run: npm install -g @musistudio/claude-code-router

      - name: Start claude-code-router (DeepSeek)
        if: inputs.skill_eval == true
        run: |
          mkdir -p ~/.claude-code-router
          python3 -c "
          import json, os
          config = {
            'PORT': 3456,
            'Router': {'default': 'deepseek,deepseek-chat', 'think': 'deepseek,deepseek-chat'},
            'Providers': [{
              'name': 'deepseek',
              'api_key': os.environ['DEEPSEEK_API_KEY'],
              'api_base_url': 'https://api.deepseek.com/v1/chat/completions',
              'models': ['deepseek-chat'],
              'transformer': {'use': ['deepseek']}
            }]
          }
          for name in ['config.json', 'config-router.json']:
            path = os.path.expanduser('~/.claude-code-router/' + name)
            with open(path, 'w') as f:
              json.dump(config, f, indent=2)
            print(f'Wrote: {path}')
          "
          ccr start &
          sleep 10
          curl -sf http://127.0.0.1:3456/health && echo "Router is up" || echo "WARNING: Router may not be ready"
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Run skill eval (E2E Agent pipeline)
        if: inputs.skill_eval == true
        run: |
          ARGS="--full --concurrency ${{ inputs.skill_concurrency || '2' }}"
          if [ "${{ inputs.ragas || 'true' }}" != "true" ]; then
            ARGS="$ARGS --no-ragas"
          fi
          python scripts/eval_skill.py $ARGS
        env:
          QDRANT_URL: http://localhost:6333
          ANTHROPIC_BASE_URL: http://127.0.0.1:3456
          ANTHROPIC_AUTH_TOKEN: "router-placeholder"
          JUDGE_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          JUDGE_MODEL: deepseek-chat
          JUDGE_BASE_URL: https://api.deepseek.com

      - name: Summary
        if: always()
        run: python scripts/generate_eval_report.py --stdout >> $GITHUB_STEP_SUMMARY

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: |
            eval/so-redis-eval-results.json
            eval/skill-eval-results.json
            eval/EVAL_RESULTS.md
